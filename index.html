<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotogram | Your Personal Photo Album</title>
  <link rel="icon" href="./assets/img/favicon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <a href="#gallery" class="skip-link">Skip to gallery</a>

<header class="site-header" role="banner">
  <div class="header-inner">
    <a href="#top" class="brand" aria-label="Fotogram home">
      <img
        src="./assets/img/Fotogram_Logo.svg"
        alt="Fotogram logo"
        class="brand__logo"
        width="215"
        height="41"
      >
    </a>
  </div>
</header>

  <main id="top" class="site-main" aria-label="Main content">
    <section class="page-content" aria-labelledby="page-title">
      <h1 id="page-title" class="hero__title">Your personal photo album</h1>

      <section class="gallery-section" aria-label="Photo gallery">
        <div id="gallery" class="gallery-grid" role="list"></div>
      </section>
    </section>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <img src="./assets/img/footer-icon.png" alt="Developer Akademie logo" class="footer-logo" width="133" height="32">
      <p class="footer-copy">© 2023 Developer Akademie GmbH</p>
    </div>
  </footer>

  <dialog id="lightbox" class="lightbox" aria-labelledby="lightbox-title" aria-modal="true">
    <div class="lightbox__panel">
      <div class="lightbox__top">
        <div class="lightbox__title-wrap">
          <h2 id="lightbox-title" class="lightbox__title"></h2>
          <button type="button" class="like-button lightbox__like" id="lightbox-like" aria-label="Like photo"></button>
        </div>

        <button type="button" class="icon-button lightbox__close" id="close-lightbox" aria-label="Close image preview">
          <svg aria-hidden="true" viewBox="0 0 24 24" width="24" height="24" fill="none">
            <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
      </div>

      <div class="lightbox__media-wrap">
        <img id="lightbox-image" class="lightbox__image" src="" alt="" width="560" height="375">
      </div>

      <div class="lightbox__bottom">
        <button type="button" class="nav-button" id="prev-button" aria-label="Previous image">
          <svg aria-hidden="true" viewBox="0 0 24 24" width="24" height="24" fill="none">
            <path d="M14 6L8 12L14 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        <p id="lightbox-counter" class="lightbox__counter" aria-live="polite"></p>

        <button type="button" class="nav-button" id="next-button" aria-label="Next image">
          <svg aria-hidden="true" viewBox="0 0 24 24" width="24" height="24" fill="none">
            <path d="M10 6L16 12L10 18" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>
    </div>
  </dialog>

  <script src="./script.js" defer></script>
</body>

</html>
